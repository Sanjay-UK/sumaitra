version: 1
frontend:
  phases:
    build:
      commands:
        - echo "Static site — no build step required"
  artifacts:
    baseDirectory: /
    files:
      - index.html
      - products.html
      - admin.html
      - style.css
      - script.js
      - admin.js
      - api.js
      - assets/**/*
      - .env.example
  cache:
    paths: []
customRedirects:
  - source: /admin
    target: /admin.html
    status: '200'
  - source: /api/<*>
    target: https://ibun2wf5kgklrkboqva5zwgzpe0kvaso.lambda-url.ap-south-1.on.aws/api/<*>
    status: '200'
